# ─────────────────────────────────────────────────────────────────────────────
# SECRETS TEMPLATE — Copy to secrets.yaml and fill in values.
# NEVER commit the filled-in secrets.yaml to git.
# Use: kubectl apply -f infrastructure/k8s/secrets.yaml
# Or use Sealed Secrets / HashiCorp Vault in production.
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: platform
type: Opaque
stringData:
  POSTGRES_USER: "platform"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_URL: "postgresql://platform:CHANGE_ME_IN_PRODUCTION@pgbouncer-service:5432/platform"
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  REDIS_URL: "redis://:CHANGE_ME_IN_PRODUCTION@redis-service:6379"
  JWT_SECRET: "CHANGE_ME_USE_A_LONG_RANDOM_STRING"
  GEMINI_API_KEY: "CHANGE_ME"
  MINIO_ROOT_USER: "platform_admin"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  GRAFANA_ADMIN_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
