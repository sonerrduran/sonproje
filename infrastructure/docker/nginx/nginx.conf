worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ─── Logging ────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;

  # ─── Performance ────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_comp_level 6;
  client_max_body_size 50M;

  # ─── Rate Limiting ──────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

  # ─── Upstream Services ──────────────────────────────────────
  upstream auth_service {
    least_conn;
    server auth-service:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream user_service {
    least_conn;
    server user-service:3003 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream school_service {
    least_conn;
    server school-service:3002 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream lesson_service {
    least_conn;
    server lesson-service:3005 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream game_service {
    least_conn;
    server game-service:3007 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream ai_service {
    least_conn;
    server ai-service:3008 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream analytics_service {
    least_conn;
    server analytics-service:3009 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream web_frontend {
    server web:3000;
    keepalive 16;
  }

  # ─── Security Headers ───────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # ─── Main Server Block ──────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Health check
    location /nginx-health {
      return 200 'OK';
      add_header Content-Type text/plain;
    }

    # ── Auth Service ─────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://auth_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_connect_timeout 30s;
      proxy_read_timeout 30s;
    }

    # ── User Service ─────────────────────────────────────────
    location /api/users/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://user_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ── School Service ────────────────────────────────────────
    location /api/schools/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://school_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ── Lesson Service ────────────────────────────────────────
    location /api/lessons/ {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://lesson_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ── Game Service ──────────────────────────────────────────
    location /api/games/ {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://game_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      # WebSocket support for real-time game events
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # ── AI Service ────────────────────────────────────────────
    location /api/ai/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://ai_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 120s; # AI responses can be slow
    }

    # ── Analytics Service ─────────────────────────────────────
    location /api/analytics/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://analytics_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ── Next.js Frontend (catch-all) ──────────────────────────
    location / {
      proxy_pass http://web_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ── Static Assets Caching ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://web_frontend;
      proxy_cache_valid 200 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      expires 30d;
    }
  }
}
